# Benchmark — 50-question evaluation set (v0.4).
#
# Contents:
#  - All 49 questions from the original benchmark (pre-v0.3 expansion):
#      5 smoke_* (verified golden)
#      15 PR #1 (easy_, multi_, cross_, infer_, ambig_, adv_, oos_)
#      29 Phase B (ae_, ah_, amb_, advf_, uid_, uos_)
#  - Plus 1 from the v0.3 expansion (multi_003) to round to 50 and strengthen
#    the multi_chunk category.
#
# Use this set for ablations — it gives every category at least 1 sample,
# most categories 2-7, and runs in ~25-30 min per ablation config (vs ~75 min
# on the full 100q benchmark, or ~7 min on the 20q subset).
#
# To run the full ablation suite on this set:
#     python scripts/run_ablations.py --benchmark eval/benchmark_50.yaml

