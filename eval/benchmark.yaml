    expected_answer: "At least 60 per cent of the CEO's total variable remuneration must be deferred over a minimum deferral period of six years, vesting no faster than on a pro-rata basis and only after four years."
    expected_answer_keywords: ["60 per cent", "six years", "CEO"]
    expected_citations:
      - {doc: "CPS 511", section: "Deferral", paragraph: "41"}
    expected_state: confident
    difficulty: easy
    verified: false
