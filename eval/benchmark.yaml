    expected_state: hedged
    difficulty: medium
    verified: false
    notes: "Multi-chunk synthesis required. Confident single-citation answer would be incomplete."

  - id: amb_002
    category: ambiguous
    question: "What testing requirements does APRA impose on regulated entities?"
    expected_answer: "Testing requirements appear across multiple standards: information security control testing (CPS 234 §27-31), information security response plan testing (CPS 234 §26), and business continuity exercises (CPS 230 §43). A complete answer must synthesise across documents."
    expected_answer_keywords: ["testing", "annual", "control effectiveness", "business continuity"]
    expected_citations:
