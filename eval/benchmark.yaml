    question: "When must I notify the regulator?"
    expected_answer: "Ambiguous — could refer to CPS 234 §35 (72 hours, information security incidents), CPS 230 §33 (72 hours, operational risk incidents), or Privacy Act eligible data breaches. System should hedge and disambiguate."
