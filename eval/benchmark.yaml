    question: "Which APRA standard sets requirements for information security?"
    expected_answer: "Prudential Standard CPS 234 Information Security."
    expected_answer_keywords: ["CPS 234", "information security"]
    expected_citations:
      - {doc: "CPS 234", section: "", paragraph: ""}
