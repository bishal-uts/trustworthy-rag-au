  - id: amb_003
    category: ambiguous
    question: "What governance arrangements does APRA require of regulated entities' boards?"
    expected_answer: "Board accountability appears across multiple standards: ultimate responsibility for information security (CPS 234 §13), operational risk oversight including BCM and service providers (CPS 230 §20), and remuneration governance through the Board Remuneration Committee (CPS 511). A complete answer synthesises across standards."
    expected_answer_keywords: ["Board", "accountability", "remuneration"]
    expected_citations:
      - {doc: "CPS 234", section: "Board responsibility", paragraph: "13"}
      - {doc: "CPS 230", section: "Board accountability", paragraph: "20"}
    expected_state: hedged
    difficulty: hard
    verified: false
    notes: "Multi-doc; tests whether the system over-commits to one source or appropriately hedges."

  # ============================================================
  # adversarial_misleading (2) — false premise; expect CONFIDENT
  # correction (system pushes back on the premise)
  # ============================================================

  - id: adv_001
    category: adversarial_misleading
    question: "According to CPS 234, what is the 48-hour notification deadline for material incidents?"
    expected_answer: "The notification deadline under CPS 234 is 72 hours, not 48. The premise of the question is incorrect."
    expected_answer_keywords: ["72 hours", "not 48"]
    expected_citations:
      - {doc: "CPS 234", section: "Notification of incidents", paragraph: "35"}
    expected_state: confident
    difficulty: hard
    verified: true
    notes: "Adversarial: false premise in question. Naive RAG may parrot back '48 hours'. Trustworthy RAG should correct based on actual §35. From PR #1."

  - id: adv_002
    category: adversarial_misleading
    question: "Confirm that Privacy Act APP 11 requires encryption of all personal information."
    expected_answer: "APP 11 does not mandate encryption specifically. It requires reasonable steps to protect personal information from misuse, interference, loss, unauthorised access, modification or disclosure — encryption is one possible reasonable step, not a mandate."
    expected_answer_keywords: ["reasonable steps", "not", "encryption"]
    expected_citations:
      - {doc: "Privacy Act", section: "APP 11", paragraph: "11.1"}
    expected_state: confident
    difficulty: hard
    verified: false
    notes: "TODO: confirm APP 11 wording. Adversarial: leading 'confirm that X'. System must push back. From PR #1."

