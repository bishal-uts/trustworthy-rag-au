  - id: amb_001
    category: ambiguous
    question: "What are an APRA-regulated entity's obligations when an information security incident occurs?"
    expected_answer: "Obligations span detection and response mechanisms (CPS 234 §23), maintenance of response plans (§24-25), annual testing of those plans (§26), and notification to APRA within 72 hours of a material incident (§35). A complete answer requires synthesising multiple paragraphs."
    expected_answer_keywords: ["detect", "response plans", "72 hours", "notify APRA"]
    expected_citations:
