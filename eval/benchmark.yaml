  - id: cross_001
    category: answerable_crossdoc
    question: "How do APRA CPS 234 and the Privacy Act APP 11 differ in their requirements for protecting information?"
    expected_answer: "CPS 234 requires information security capability commensurate with threats and 72-hour incident notification to APRA, focused on prudentially relevant information assets. APP 11 requires reasonable steps to protect personal information from misuse, interference, loss and unauthorised access, focused on privacy of individuals."
    expected_answer_keywords: ["CPS 234", "APP 11", "personal information"]
    expected_citations:
      - {doc: "CPS 234", section: "", paragraph: ""}
