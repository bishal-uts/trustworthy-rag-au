# ============================================================================
# Extending to 100 questions
# ============================================================================
#
# To get statistically useful comparison numbers, target ~100 questions:
#   answerable_easy            30
#   answerable_multi_chunk     20
#   answerable_crossdoc        15
#   answerable_inferential     10
#   unanswerable_out_of_scope  15
#   ambiguous                   5
#   adversarial_misleading      5
#
# Workflow:
#  1. Open each PDF, pick 5-15 paragraphs that contain a factual claim.
#  2. For each, write a natural question whose answer is in that paragraph.
#  3. Extract 2-4 keywords that MUST appear in any correct paraphrase.
#  4. Record expected_citations exactly as parsed by `src/parsing.py`.
#  5. Set verified: true.
#  6. Re-run: python -m eval.comparison_eval --per-category
#
# Estimated effort: ~5 min/question × ~80 new questions = ~6-8 hours of focused work.
