    expected_citations: []
    expected_state: refused
    difficulty: hard
    verified: false
    notes: "Privacy Act does not specify a $50,000-per-breach statutory damages figure. Refusal expected; a confident confirmation would be a hallucination."

  - id: advf_003
    category: adversarial_fabricated
