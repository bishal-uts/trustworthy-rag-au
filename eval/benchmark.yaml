# Benchmark — v0.2 (extended for comparison eval).
#
# IMPORTANT: This file is NOT covered by the project's MIT licence. It is
# the ground truth used to compare trustworthy RAG vs baseline RAGs.
#
# v0.1 had 5 questions (the originals kept below, unchanged).
# v0.2 adds:
#   - expected_answer_keywords  (list of strings for cheap keyword judge)
#   - difficulty                (easy | medium | hard)
#   - additional categories     (answerable_multi_chunk, adversarial, ambiguous)
#
# Target: ~100 questions across categories for stat. significance. The 20
# below are seeded examples — extend by reading the source PDFs and
# following the same schema. Any entry marked `verified: false` needs an
# expert to confirm the expected answer / citation against the actual PDF
# before being trusted in results.
#
# Schema per question:
#   id                          unique short id
#   category                    see categories below
#   question                    natural-language question
#   expected_answer             reference answer text (used by NLI/LLM judges)
#   expected_answer_keywords    list of substrings used by KeywordJudge
#   expected_citations          list of {doc, section, paragraph}
#   expected_state              confident | hedged | refused
#   difficulty                  easy | medium | hard
#   verified                    true if confirmed against source PDF
#   notes                       free text — source pointer, gotchas
#
# Categories:
#   answerable_easy             single chunk supports the answer
#   answerable_multi_chunk      needs 2-3 chunks in the same doc
#   answerable_crossdoc         needs chunks across 2+ documents
#   answerable_inferential      requires reasoning over the chunk text
#   unanswerable_out_of_scope   answer not in the 7-doc corpus
#   ambiguous                   under-specified; system should hedge / clarify
#   adversarial_misleading      premise embedded in the question is false

questions:
  # ---------- v0.1 originals (verified) ----------

  - id: smoke_001
    category: answerable_easy
    question: "Within how many hours must an APRA-regulated entity notify APRA of a material information security incident?"
    expected_answer: "As soon as possible and no later than 72 hours after becoming aware."
    expected_answer_keywords: ["72 hours", "aware"]
    expected_citations:
      - {doc: "CPS 234", section: "Notification of incidents", paragraph: "35"}
    expected_state: confident
    difficulty: easy
    verified: true
    notes: "Source: CPS 234 §35. Used as the v0.1 golden question."

  - id: smoke_002
    category: unanswerable_out_of_scope
    question: "What is the AUSTRAC reporting threshold for cryptocurrency-to-cash transactions under the AML/CTF Rules?"
    expected_answer: null
    expected_answer_keywords: []
    expected_citations: []
    expected_state: refused
    difficulty: easy
    verified: true
    notes: "AML/CTF Rules are not in the 7-doc corpus. Should refuse without LLM call."

  - id: smoke_003
    category: unanswerable_out_of_scope
    question: "What is the recipe for pavlova?"
    expected_answer: null
    expected_answer_keywords: []
    expected_citations: []
    expected_state: refused
    difficulty: easy
    verified: true
    notes: "Wholly off-domain. Should refuse trivially on retrieval scores."

  - id: smoke_004
    category: answerable_easy
    question: "What does APP 11 require regarding the security of personal information?"
    expected_answer: "Reasonable steps to protect personal information from misuse, interference, loss, unauthorised access, modification or disclosure."
    expected_answer_keywords: ["reasonable steps", "personal information", "unauthorised"]
    expected_citations:
      - {doc: "Privacy Act", section: "APP 11", paragraph: "11.1"}
    expected_state: confident
    difficulty: easy
    verified: true
    notes: "Source: Privacy Act, Australian Privacy Principle 11."

  - id: smoke_005
    category: answerable_easy
    question: "Under CPS 230, what is operational risk?"
    expected_answer: "Operational risks that may result from inadequate or failed internal processes or systems, the actions or inactions of people, or external drivers and events. Operational risk is inherent in all products, activities, processes and systems."
    expected_answer_keywords: ["internal processes", "people", "external"]
    expected_citations:
      - {doc: "CPS 230", section: "Operational risk management", paragraph: "13"}
    expected_state: confident
    difficulty: easy
    verified: true
    notes: "Source: CPS 230 §13. §24 lists categories. No standalone definition section."

  # ---------- v0.2 additions: answerable_easy ----------

  - id: easy_001
