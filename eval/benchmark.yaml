  - id: ae_009
    category: answerable_easy
    question: "For senior managers, executive directors and highly-paid material risk-takers, what is the minimum clawback period under CPS 511?"
    expected_answer: "At least two years from the date of payment or vesting of variable remuneration."
    expected_answer_keywords: ["two years", "clawback"]
    expected_citations:
      - {doc: "CPS 511", section: "Clawback", paragraph: "36"}
