    expected_state: confident
    difficulty: easy
    verified: false
    notes: "Source: RG 271.56."

  # ============================================================
  # answerable_hard (8) — multi-paragraph synthesis within one doc
  # ============================================================

  - id: ah_001
    category: answerable_hard
    question: "Under CPS 234, what three factors must the nature and frequency of an APRA-regulated entity's systematic testing program be commensurate with?"
    expected_answer: "(a) the rate at which vulnerabilities and threats change; (b) the criticality and sensitivity of the information asset; and (c) the consequences of an information security incident."
    expected_answer_keywords: ["vulnerabilities", "criticality", "consequences"]
    expected_citations:
      - {doc: "CPS 234", section: "Testing control effectiveness", paragraph: "27"}
    expected_state: confident
    difficulty: medium
    verified: false
    notes: "Source: CPS 234 §27(a)-(c)."

  - id: ah_002
    category: answerable_hard
    question: "Under CPS 234, what two qualifications must personnel conducting information security control testing have?"
    expected_answer: "They must be appropriately skilled and functionally independent specialists."
    expected_answer_keywords: ["appropriately skilled", "functionally independent"]
    expected_citations:
      - {doc: "CPS 234", section: "Testing control effectiveness", paragraph: "30"}
    expected_state: confident
    difficulty: easy
    verified: false
    notes: "Source: CPS 234 §30."

  - id: ah_003
    category: answerable_hard
    question: "How does CPS 511 distinguish between 'malus' and 'clawback'?"
    expected_answer: "Malus reduces or cancels unvested variable remuneration before it vests; clawback recovers some or all variable remuneration after it has already been paid or vested."
    expected_answer_keywords: ["malus", "clawback", "vested", "paid"]
    expected_citations:
      - {doc: "CPS 511", section: "Definitions", paragraph: "20"}
    expected_state: confident
    difficulty: medium
    verified: false
    notes: "Source: CPS 511 §20 definitions. Requires synthesising both definitions."

  - id: ah_004
    category: answerable_hard
    question: "Under CPS 511, what two features must clawback arrangements include for senior managers, executive directors and highly-paid material risk-takers?"
    expected_answer: "(a) a period of at least two years from the date of payment or vesting within which clawback may apply; and (b) application of clawback where prescribed circumstances exist."
    expected_answer_keywords: ["two years", "payment", "vesting"]
    expected_citations:
      - {doc: "CPS 511", section: "Clawback", paragraph: "36"}
    expected_state: confident
    difficulty: medium
    verified: false
    notes: "Source: CPS 511 §36(a)-(b)."

  - id: ah_005
    category: answerable_hard
    question: "Under CPS 230, what must an APRA-regulated entity's operational risk management be integrated into, and what must business continuity planning be consistent with?"
    expected_answer: "Operational risk management must be integrated into the entity's overall risk management framework and processes. Business continuity planning must be consistent with, and not conflict with or undermine, the entity's recovery and exit planning."
    expected_answer_keywords: ["risk management framework", "business continuity", "recovery and exit"]
    expected_citations:
      - {doc: "CPS 230", section: "Operational risk management", paragraph: "18"}
    expected_state: confident
    difficulty: medium
    verified: false
    notes: "Source: CPS 230 §18."

  - id: ah_006
    category: answerable_hard
    question: "Under the Privacy Act, what is an 'eligible data breach' for the purposes of the notifiable data breach scheme?"
    expected_answer: "Broadly, an eligible data breach occurs where there is unauthorised access to, unauthorised disclosure of, or loss of, personal information held by an entity, and a reasonable person would conclude the breach is likely to result in serious harm to any of the individuals to whom the information relates."
    expected_answer_keywords: ["unauthorised access", "unauthorised disclosure", "loss", "serious harm"]
    expected_citations:
      - {doc: "Privacy Act", section: "Eligible data breach", paragraph: "26WE"}
    expected_state: confident
    difficulty: hard
    verified: false
    notes: "Source: Privacy Act Part IIIC, s 26WE. Multi-element definition."

  - id: ah_007
    category: answerable_hard
    question: "Under RG 271, what must an IDR response from a financial firm to a complainant include?"
    expected_answer: "(a) the final outcome of the complaint (either confirmation of actions taken to fully resolve it, or reasons for full or partial rejection); (b) the complainant's right to take the complaint to AFCA if not satisfied; and (c) AFCA's contact details."
    expected_answer_keywords: ["final outcome", "AFCA", "contact details"]
    expected_citations:
      - {doc: "RG 271", section: "IDR response content", paragraph: "53"}
    expected_state: confident
    difficulty: medium
    verified: false
    notes: "Source: RG 271.53."

  - id: ah_008
    category: answerable_hard
    question: "Under CPS 234, what is the Board of an APRA-regulated entity ultimately responsible for, and what must it ensure?"
    expected_answer: "The Board is ultimately responsible for the information security of the entity. The Board must ensure that the entity maintains information security in a manner commensurate with the size and extent of threats to its information assets, and which enables the continued sound operation of the entity."
    expected_answer_keywords: ["Board", "ultimately responsible", "commensurate", "threats"]
    expected_citations:
      - {doc: "CPS 234", section: "Board responsibility", paragraph: "13"}
    expected_state: confident
    difficulty: easy
    verified: false
    notes: "Source: CPS 234 §13."

