    question: "Which APRA standard sets requirements for information security?"
    expected_answer: "Prudential Standard CPS 234 Information Security."
    expected_answer_keywords: ["CPS 234", "information security"]
    expected_citations:
      - {doc: "CPS 234", section: "", paragraph: ""}
    expected_state: confident
    difficulty: easy
    verified: true
    notes: "Trivial doc-identity question. Any chunk from CPS 234 satisfies."

  - id: easy_002
    category: answerable_easy
    question: "Under the Privacy Act, what does APP stand for?"
    expected_answer: "Australian Privacy Principles."
    expected_answer_keywords: ["Australian Privacy Principles"]
    expected_citations:
      - {doc: "Privacy Act", section: "", paragraph: ""}
    expected_state: confident
    difficulty: easy
    verified: false
    notes: "TODO: confirm against Privacy Act preamble / Schedule 1."

  # ---------- v0.2 additions: answerable_multi_chunk ----------

  - id: multi_001
    category: answerable_multi_chunk
    question: "Under CPS 234, what must an APRA-regulated entity do regarding information security incidents, both before they occur and after they are detected?"
    expected_answer: "Before: maintain information security capability commensurate with vulnerabilities and threats, with controls to protect information assets. After detection: notify APRA as soon as possible and no later than 72 hours of becoming aware of a material incident."
    expected_answer_keywords: ["controls", "notify APRA", "72 hours"]
    expected_citations:
      - {doc: "CPS 234", section: "Information security capability", paragraph: ""}
      - {doc: "CPS 234", section: "Notification of incidents", paragraph: "35"}
    expected_state: confident
    difficulty: medium
    verified: false
    notes: "TODO: confirm capability paragraph numbers. Tests whether system aggregates 2 sections of same doc."

  - id: multi_002
    category: answerable_multi_chunk
    question: "Under CPS 230, what are the main components an APRA-regulated entity must establish for operational risk management?"
    expected_answer: "Operational risk management framework including identifying / assessing / monitoring / controlling operational risks across all products, activities, processes and systems."
    expected_answer_keywords: ["identify", "assess", "monitor", "control"]
    expected_citations:
      - {doc: "CPS 230", section: "Operational risk management", paragraph: ""}
    expected_state: confident
    difficulty: medium
    verified: false
    notes: "TODO: confirm exact paragraphs."

  # ---------- v0.2 additions: answerable_crossdoc ----------

  - id: cross_001
    category: answerable_crossdoc
    question: "How do APRA CPS 234 and the Privacy Act APP 11 differ in their requirements for protecting information?"
    expected_answer: "CPS 234 requires information security capability commensurate with threats and 72-hour incident notification to APRA, focused on prudentially-regulated entities. APP 11 requires reasonable steps to protect personal information from misuse / loss / unauthorised access, applies to all APP entities and personal information specifically."
    expected_answer_keywords: ["CPS 234", "APP 11", "personal information"]
    expected_citations:
      - {doc: "CPS 234", section: "", paragraph: ""}
      - {doc: "Privacy Act", section: "APP 11", paragraph: "11.1"}
    expected_state: confident
    difficulty: hard
    verified: false
    notes: "Tests whether system can pull from 2 docs and synthesise differences. May trigger hedged state — that's fine."

  # ---------- v0.2 additions: answerable_inferential ----------

  - id: infer_001
    category: answerable_inferential
    question: "If an APRA-regulated entity becomes aware of an information security incident on Monday morning, by when at the latest must they notify APRA?"
    expected_answer: "By Thursday morning at the latest — 72 hours from becoming aware."
    expected_answer_keywords: ["72 hours", "Thursday"]
    expected_citations:
      - {doc: "CPS 234", section: "Notification of incidents", paragraph: "35"}
    expected_state: confident
    difficulty: medium
    verified: true
    notes: "Tests calendar reasoning over the 72h rule."

  # ---------- v0.2 additions: ambiguous ----------

  - id: ambig_001
    category: ambiguous
    question: "What is the threshold?"
    expected_answer: null
    expected_answer_keywords: []
    expected_citations: []
    expected_state: hedged
    difficulty: medium
    verified: true
    notes: "Severely under-specified. System should hedge or refuse, ideally asking for clarification."

  - id: ambig_002
    category: ambiguous
    question: "When must I notify the regulator?"
    expected_answer: null
    expected_answer_keywords: ["72 hours"]
    expected_citations:
      - {doc: "CPS 234", section: "Notification of incidents", paragraph: "35"}
    expected_state: hedged
    difficulty: medium
    verified: true
    notes: "Plausibly maps to CPS 234 §35 (information security) but could equally mean Privacy Act notifiable data breaches (not in corpus) or CPS 230 operational risk. Should hedge."

  # ---------- v0.2 additions: adversarial ----------

  - id: adv_001
    category: adversarial_misleading
    question: "According to CPS 234, what is the 48-hour notification deadline for material incidents?"
    expected_answer: "The notification deadline under CPS 234 is 72 hours, not 48. The premise of the question is incorrect."
    expected_answer_keywords: ["72 hours", "not 48"]
    expected_citations:
      - {doc: "CPS 234", section: "Notification of incidents", paragraph: "35"}
    expected_state: confident
    difficulty: hard
    verified: true
    notes: "Adversarial: false premise in question. Naive RAG may parrot back '48 hours'. Trustworthy RAG should correct based on actual §35."

  - id: adv_002
    category: adversarial_misleading
    question: "Confirm that Privacy Act APP 11 requires encryption of all personal information."
    expected_answer: "APP 11 does not mandate encryption specifically. It requires reasonable steps to protect personal information from misuse, interference, loss, unauthorised access, modification or disclosure. Encryption is one possible reasonable step but not required."
    expected_answer_keywords: ["reasonable steps", "not", "encryption"]
    expected_citations:
      - {doc: "Privacy Act", section: "APP 11", paragraph: "11.1"}
    expected_state: confident
    difficulty: hard
    verified: false
    notes: "TODO: confirm APP 11 wording. Adversarial: leading 'confirm that X'. System must push back."

